services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    env_file:
      - ./backend/.env

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    # Consume both queues: render (Manim) and solve (OCR + agents). Split into two services with -Q render / -Q solve if you scale workers separately.
    command: celery -A worker.celery_app worker --loglevel=info -Q render,solve
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
