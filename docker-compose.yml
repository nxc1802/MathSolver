services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    env_file:
      - ./backend/.env

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    # Task routes use queues `render` and `ocr`. Image may set CELERY_WORKER_QUEUES=render; override so Celery loads both task modules.
    environment:
      CELERY_WORKER_QUEUES: render,ocr
    # Task routes use queues `render` and `ocr` (no Celery solve queue). Local one container listens to both.
    command: >
      celery -A worker.celery_app worker --loglevel=info --concurrency=1
      -Q render,ocr
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
