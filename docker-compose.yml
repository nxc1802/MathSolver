services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    env_file:
      - ./backend/.env

  # Render (Manim) and OCR use separate images/deps; run two workers each consuming one queue.
  worker-render:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      CELERY_WORKER_QUEUES: render
    command: >
      celery -A worker.celery_app worker --loglevel=info --concurrency=1
      -Q render
    env_file:
      - ./backend/.env

  worker-ocr:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker.ocr
    environment:
      CELERY_WORKER_QUEUES: ocr
    command: >
      celery -A worker.celery_app worker --loglevel=info --concurrency=1
      -Q ocr
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
