name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Backend Image
        run: docker build -t visual-math-backend ./backend -f ./backend/Dockerfile.backend
        
      - name: Build Frontend Image
        run: docker build -t visual-math-frontend ./frontend -f ./frontend/Dockerfile.frontend
