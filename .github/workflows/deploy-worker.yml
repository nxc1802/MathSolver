name: Deploy Worker to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/worker/**'
      - 'backend/worker_health.py'
      - 'backend/app/jobs/**'
      - 'backend/app/job_events.py'
      - 'backend/agents/renderer_agent.py'
      - 'backend/agents/orchestrator.py'
      - 'backend/solver/**'
      - 'backend/requirements.txt'
      - 'backend/Dockerfile.worker'
      - 'backend/README_HF_WORKER.md'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy-worker:
    # Secret HF_WORKER_REPO = owner/space (e.g. Cuong2004/math-solver-worker). Same pattern as solve worker.
    if: ${{ secrets.HF_WORKER_REPO != '' && secrets.HF_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face Spaces (Worker)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_WORKER_REPO: ${{ secrets.HF_WORKER_REPO }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"
          
          mkdir hf_worker_copy
          cp -r backend/* hf_worker_copy/
          
          cd hf_worker_copy
          
          # Rename Dockerfile.worker to Dockerfile
          if [ -f "Dockerfile.worker" ]; then
            mv Dockerfile.worker Dockerfile
          fi
          
          # Rename README_HF_WORKER.md to README.md for metadata
          if [ -f "README_HF_WORKER.md" ]; then
            mv README_HF_WORKER.md README.md
          fi
          
          git init
          OWNER="${HF_WORKER_REPO%%/*}"
          git remote add origin "https://${OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_WORKER_REPO}"
          git add .
          git commit -m "Deploy Worker from GitHub Actions"
          git push --force origin master:main
