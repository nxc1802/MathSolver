# Hugging Face Space: Manim / Celery queue `render` only (Dockerfile.worker sets CELERY_WORKER_QUEUES=render).
# OCR uses a separate Space: deploy-worker-ocr.yml + Dockerfile.worker.ocr.

name: Deploy Render Worker to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/worker/**'
      - 'backend/worker_health.py'
      - 'backend/app/jobs/**'
      - 'backend/app/job_events.py'
      - 'backend/agents/renderer_agent.py'
      - 'backend/geometry_render/**'
      - 'backend/requirements.worker-render.txt'
      - 'backend/scripts/prewarm_render_worker.py'
      - 'backend/Dockerfile.worker'
      - 'backend/README_HF_WORKER.md'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy-worker:
    # HF_WORKER_REPO + HF_TOKEN: repository secrets (see README_HF_WORKER.md).
    # Do not use job-level `if: secrets.*` — some validators reject it; skip inside the step instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face Spaces (render worker)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_WORKER_REPO: ${{ secrets.HF_WORKER_REPO }}
        run: |
          if [ -z "$HF_WORKER_REPO" ] || [ -z "$HF_TOKEN" ]; then
            echo "::notice::Skipping Hugging Face worker deploy: set repository secrets HF_WORKER_REPO and HF_TOKEN."
            exit 0
          fi
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"
          
          mkdir hf_worker_copy
          cp -r backend/* hf_worker_copy/
          
          cd hf_worker_copy
          
          # Rename Dockerfile.worker to Dockerfile
          if [ -f "Dockerfile.worker" ]; then
            mv Dockerfile.worker Dockerfile
          fi
          
          # Rename README_HF_WORKER.md to README.md for metadata
          if [ -f "README_HF_WORKER.md" ]; then
            mv README_HF_WORKER.md README.md
          fi
          
          git init
          OWNER="${HF_WORKER_REPO%%/*}"
          git remote add origin "https://${OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_WORKER_REPO}"
          git add .
          git commit -m "Deploy render worker from GitHub Actions"
          git push --force origin master:main
