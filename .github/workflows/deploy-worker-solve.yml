# Optional second Hugging Face Space for the `solve` queue (OCR + agents).
# Secrets (same style as deploy-worker.yml):
#   HF_TOKEN + HF_SOLVE_WORKER_REPO = owner/space-name (e.g. YourOrg/math-solver-worker-solve)
# Space variables: CELERY_WORKER_QUEUES=solve, same Redis/Supabase/OpenRouter as API.
# If HF_SOLVE_WORKER_REPO or HF_TOKEN is unset, this job is skipped.

name: Deploy Solve Worker to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/worker/**'
      - 'backend/worker_health.py'
      - 'backend/app/jobs/**'
      - 'backend/app/job_events.py'
      - 'backend/agents/**'
      - 'backend/solver/**'
      - 'backend/requirements.txt'
      - 'backend/Dockerfile.worker'
      - 'backend/README_HF_WORKER.md'
      - '.github/workflows/deploy-worker-solve.yml'

jobs:
  deploy-worker-solve:
    if: ${{ secrets.HF_SOLVE_WORKER_REPO != '' && secrets.HF_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces (Solve worker)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SOLVE_WORKER_REPO: ${{ secrets.HF_SOLVE_WORKER_REPO }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

          mkdir hf_worker_solve_copy
          cp -r backend/* hf_worker_solve_copy/

          cd hf_worker_solve_copy

          if [ -f "Dockerfile.worker" ]; then
            mv Dockerfile.worker Dockerfile
          fi

          if [ -f "README_HF_WORKER.md" ]; then
            mv README_HF_WORKER.md README.md
          fi

          git init
          OWNER="${HF_SOLVE_WORKER_REPO%%/*}"
          git remote add origin "https://${OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SOLVE_WORKER_REPO}"
          git add .
          git commit -m "Deploy solve worker from GitHub Actions"
          git push --force origin master:main
